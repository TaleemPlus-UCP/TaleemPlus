name: TaleemPlus CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false # Temporary disable cache to avoid corrupted data

      - name: Create Config Files
        run: |
          mkdir -p android/app
          # Only create if secrets are present to avoid malformed files
          if [ ! -z "${{ secrets.FIREBASE_OPTIONS }}" ]; then echo "${{ secrets.FIREBASE_OPTIONS }}" > lib/firebase_options.dart; fi
          if [ ! -z "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json; fi

      - name: Clean & Get Dependencies
        run: |
          rm -f pubspec.lock
          flutter pub cache clean --force
          flutter pub get --verbose

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Web
        run: flutter build web

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Web
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
