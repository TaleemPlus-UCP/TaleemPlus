name: TaleemPlus CI/CD 🚀

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main", "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: Lint & Test 🧪
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Provide Firebase Options
        run: |
          if [ -n "${{ secrets.FIREBASE_OPTIONS }}" ]; then
            echo "${{ secrets.FIREBASE_OPTIONS }}" > lib/firebase_options.dart
          else
            printf "%s\n" \
              "import 'package:firebase_core/firebase_core.dart';" \
              "" \
              "class DefaultFirebaseOptions {" \
              "  static FirebaseOptions get currentPlatform => const FirebaseOptions(" \
              "        apiKey: 'test-api-key'," \
              "        appId: '1:1234567890:web:test'," \
              "        messagingSenderId: '1234567890'," \
              "        projectId: 'test-project-id'," \
              "      );" \
              "}" \
              > lib/firebase_options.dart
          fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Check Format
        run: dart format --set-exit-if-changed lib

      - name: Static Analysis
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run Unit Tests
        run: flutter test --coverage

  build-android:
    name: Android Release 🤖
    needs: qa
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Inject Secrets
        run: |
          mkdir -p android/app
          echo "${{ secrets.FIREBASE_OPTIONS }}" > lib/firebase_options.dart
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/*.apk

  build-web:
    name: Web Deployment 🌐
    needs: qa
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Inject Secrets
        run: echo "${{ secrets.FIREBASE_OPTIONS }}" > lib/firebase_options.dart

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_TALEEMPLUS_40755 || secrets.FIREBASE_SERVICE_ACCOUNT }}"
          channelId: live
          projectId: taleemplus-40755

  create-release:
    name: Create GitHub Release 📦
    needs: [build-android, build-web]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.apk
          draft: false
          prerelease: false
          generate_release_notes: true
