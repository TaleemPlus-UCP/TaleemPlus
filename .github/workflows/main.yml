name: TaleemPlus CI/CD 🚀

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main", "master" ]

# Prevent duplicate runs when new commits are pushed to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- STEP 1: Quality Check ---
  qa:
    name: Lint & Test 🧪
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Check Format
        run: dart format --set-exit-if-changed lib

      - name: Static Analysis
        run: flutter analyze

      - name: Run Unit Tests
        run: flutter test --coverage

      - name: Upload Coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # --- STEP 2: Android Build & Distribution ---
  build-android:
    name: Android Release 🤖
    needs: qa
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Inject Secrets
        run: |
          mkdir -p android/app
          echo "${{ secrets.FIREBASE_OPTIONS }}" > lib/firebase_options.dart
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/*.apk

      # Optional: Deploy to Firebase App Distribution
      - name: Upload to App Distribution
        if: success() && secrets.FIREBASE_APP_DISTRIBUTION_CREDENTIALS != ''
        uses: wzieba/Firebase-App-Distribution@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_APP_DISTRIBUTION_CREDENTIALS }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-release.apk

  # --- STEP 3: Web Build & Hosting ---
  build-web:
    name: Web Deployment 🌐
    needs: qa
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Inject Secrets
        run: echo "${{ secrets.FIREBASE_OPTIONS }}" > lib/firebase_options.dart

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web

      # Optional: Deploy to Firebase Hosting
      - name: Deploy to Firebase Hosting
        if: success() && secrets.FIREBASE_SERVICE_ACCOUNT != ''
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          channelId: live
          projectId: taleemplus-40755

  # --- STEP 4: GitHub Release ---
  create-release:
    name: Create GitHub Release 📦
    needs: [build-android, build-web]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.apk
          draft: false
          prerelease: false
          generate_release_notes: true
