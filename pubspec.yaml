name: taleemplus_app
description: "TaleemPlus - Offline-first AI-powered academy management app"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management (pick ONE — provider is simpler for a solo build)
  provider: ^6.1.2

  # Local database
  sqflite: ^2.3.3
  path: ^1.9.0

  # Firebase (Auth + Firestore for cloud sync)
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1

  # Connectivity (drives offline-first sync logic)
  connectivity_plus: ^6.0.3

  # OCR
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2

  # On-device ML inference for the risk predictor (Week 6)
  # tflite_flutter: ^0.11.0

  # Charts for Admin/Parent dashboards
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

  cupertino_icons: ^1.0.6
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/ml_models/

  # fonts:
  #   - family: YourFont
  #     fonts:
  #       - asset: assets/fonts/YourFont-Regular.ttf